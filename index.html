    const tbody = document.getElementById('tbody');
    const counter = document.getElementById('counter');
    const filters = document.querySelectorAll('.filter-btn');
    let current = 'all';

    function renderRows() {
      let count = 0;
      tbody.querySelectorAll('tr').forEach(tr => {
        const show = current === 'all' || tr.dataset.status === current || tr.dataset.vetor === current;
        tr.classList.toggle('hidden', !show);
        if (show) count++;
      });
      counter.textContent = `Exibindo ${count} de 41 empresas`;
    }

    rows.forEach(r => {
      const tr = document.createElement('tr');
      const vmap = { v1: 'V1 — Integrada', v2: 'V2 — Digital/CRM', 'v1+v2': 'V1 + V2', v3: 'V3 — ESG/Causa' };
      const vcls = { 'v1': 'v1', 'v2': 'v2', 'v1+v2': 'v12', 'v3': 'v3' };
      const smap = { q: '🟢 Qualificado', w: '🟡 Watch', d: '🔴 Descartado' };
      const scls = { q: 'q', w: 'w', d: 'd' };
      const vfilter = r.v.replace(/\+.*/, '');
      tr.dataset.status = r.s;
      tr.dataset.vetor = vfilter;
      tr.innerHTML = `
        <td>
          <span class="empresa">${r.e}</span>
          <div class="fat">${r.fat}</div>
        </td>
        <td class="industria">${r.ind}</td>
        <td><span class="badge ${vcls[r.v] || 'v1'}">${vmap[r.v] || r.v}</span></td>
        <td><span class="badge ${scls[r.s]}">${smap[r.s]}</span></td>
        <td class="momentum">${r.m}</td>
        <td class="fonte"><a href="${r.fu}" target="_blank">${r.f}</a></td>
        <td class="justificativa">${r.j}</td>
      `;
      tbody.appendChild(tr);
    });

    filters.forEach(btn => {
      btn.addEventListener('click', () => {
        filters.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        current = btn.dataset.filter;
        renderRows();
      });
    });

    renderRows();
  </script>
